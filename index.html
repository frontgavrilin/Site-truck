<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truck</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/fonts.css">
</head>
<body>
    <header class="flex header">
        <div class="flex header-left">
            <div class="flex header-top">
                <div class="flex header-up">
                    <i class="icon-drop inter-14-300"></i>
                    <p class="adress inter-14-300">Наш адрес:</p>
                </div>
                <p class="flex header-down inter-14-300">г. Бишкек, ул. Ляляля 69</p>
            </div>
        </div>
        <div class="flex header-right">
            <div class="flex header-top">
                <div class="flex header-up">
                    <i class="icon-ant-design_clock-circle-filled inter-14-300"></i>
                    <p class="adress inter-14-300">График работы:</p>
                </div>
                <p class="flex header-down inter-14-300">С 8:00 до 22:00 без выходных</p>
            </div>
            <div class="flex header-top">
                <div class="flex header-up">
                    <i class="icon-phone inter-14-300"></i>
                    <p class="adress inter-14-300">+7 (708) 51 51 518</p>
                </div>
                <p class="flex header-down inter-14-300">+7 (700) 51 51 518</p>
            </div>
        </div>
    </header>
</body>
</html>
